<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Măiestria apiculturii — Zona de membri</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="core.css?v=50">
</head>

<body>

    <!-- ============ PRE-PAGE WELCOME SCREEN ============ -->
    <div id="pre-page" class="pre-page-overlay">
        <div class="pre-page-bg"></div>
        <div class="pre-page-content">
            <div class="pre-page-icon">🐝</div>
            <h1>Măiestria apiculturii</h1>
            <p>Accesul dumneavoastră premium este confirmat.<br>Descoperiți lumea minunată a albinelor.</p>
            <div class="pre-page-features">
                <span>📖 Cărți</span>
                <span>🎥 Lecții Video</span>
                <span>💬 Asistență</span>
            </div>
            <button onclick="let el=document.getElementById('pre-page'); el.style.opacity='0'; setTimeout(()=>el.style.display='none',600);">
                Accesează Materialele →
            </button>
        </div>
    </div>

    <div id="floating-help-container"></div>

    <div class="app-container">
        <header class="app-header">
            <div class="header-logo">
                <img src="assets/logo.png" alt="Logo" id="brand-logo" onerror="this.style.display='none'">
                <h1 id="brand-title"></h1>
            </div>
        </header>

        <main id="app-root" class="main-content">
            <div class="loader-container">
                <i data-lucide="loader-2" class="spin-icon"></i>
            </div>
        </main>

        <nav class="bottom-tab-bar" id="main-nav">
            <a href="#livros" class="tab-item" data-tab="livros">
                <i data-lucide="book-open"></i>
                <span>Cărți</span>
            </a>
            <a href="#videos" class="tab-item" data-tab="videos">
                <i data-lucide="play-circle"></i>
                <span>Videoclipuri</span>
            </a>
            <a href="#contato" class="tab-item" data-tab="contato">
                <i data-lucide="message-square"></i>
                <span>Contact</span>
            </a>
        </nav>
    </div>

    <script src="data.js?v=50"></script>
    <script src="app.js?v=50"></script>

</body>

</html>
