name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'bible1/**'
      - 'bible1-members/**'
      - 'bible1-es/**'
      - 'bible1-it/**'
      - 'sc/**'
      - 'sc-es/**'
      - 'sc-it/**'
      - 'sc-pt/**'
      - 'py/**'
      - 'py-es/**'
      - 'py-fr/**'
      - 'WW/**'
      - 'ww-de/**'
      - 'ww-plans-fr/**'
      - 'ww-plans-it/**'
      - 'mw-de/**'
      - 'mw/**'
      - 'bkp/**'
      - 'bkp-de/**'
      - 'bkp-es/**'
      - 'bkp-pt/**'
      - 'hx-fr/**'
      - 'hx-it/**'
      - 'beekeeping-members/**'
      - 'beekeeping-de-members/**'
      - 'beekeeping-fr-members/**'
      - 'beekeeping-it-members/**'
      - 'beekeeping-es-members/**'
      - 'beekeeping-pt-members/**'
      - 'ww-members/**'
      - 'ww-de-members/**'
      - 'metalon-members/**'
      - 'excel/**'
      - 'excel-plans-fr/**'
      - 'excel-plans-de/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare VPS Directories for Deployments
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          script: |
            sudo mkdir -p /var/www/storeinfocus.com/bible1
            sudo mkdir -p /var/www/storeinfocus.com/bible1-members
            sudo mkdir -p /var/www/storeinfocus.com/bible1-es
            sudo mkdir -p /var/www/storeinfocus.com/bible1-it
            sudo mkdir -p /var/www/storeinfocus.com/sc
            sudo mkdir -p /var/www/storeinfocus.com/sc-es
            sudo mkdir -p /var/www/storeinfocus.com/sc-it
            sudo mkdir -p /var/www/storeinfocus.com/sc-pt
            sudo mkdir -p /var/www/storeinfocus.com/py
            sudo mkdir -p /var/www/storeinfocus.com/py-es
            sudo mkdir -p /var/www/storeinfocus.com/py-fr
            sudo chown -R ${{ secrets.VPS_USERNAME }}:${{ secrets.VPS_USERNAME }} /var/www/storeinfocus.com || true
            sudo mkdir -p /var/www/skillvault.blog/ww
            sudo mkdir -p /var/www/skillvault.blog/ww-de
            sudo mkdir -p /var/www/skillvault.blog/ww-plans-fr
            sudo mkdir -p /var/www/skillvault.blog/ww-plans-it
            sudo mkdir -p /var/www/skillvault.blog/mw-de
            sudo mkdir -p /var/www/skillvault.blog/mw
            sudo mkdir -p /var/www/skillvault.blog/bkp
            sudo mkdir -p /var/www/skillvault.blog/bkp-de
            sudo mkdir -p /var/www/skillvault.blog/bkp-es
            sudo mkdir -p /var/www/skillvault.blog/bkp-pt
            sudo mkdir -p /var/www/skillvault.blog/hx-fr
            sudo mkdir -p /var/www/skillvault.blog/hx-it
            sudo mkdir -p /var/www/skillvault.blog/bkp-m
            sudo mkdir -p /var/www/skillvault.blog/bkp-de-m
            sudo mkdir -p /var/www/skillvault.blog/hx-fr-m
            sudo mkdir -p /var/www/skillvault.blog/hx-it-m
            sudo mkdir -p /var/www/skillvault.blog/hx-es-m
            sudo mkdir -p /var/www/skillvault.blog/hx-pt-m
            sudo mkdir -p /var/www/skillvault.blog/ww-m
            sudo mkdir -p /var/www/skillvault.blog/ww-de-m
            sudo mkdir -p /var/www/skillvault.blog/mw-m
            sudo mkdir -p /var/www/skillvault.blog/excel
            sudo mkdir -p /var/www/skillvault.blog/excel-plans-fr
            sudo mkdir -p /var/www/skillvault.blog/excel-plans-de
            sudo chown -R ${{ secrets.VPS_USERNAME }}:${{ secrets.VPS_USERNAME }} /var/www/skillvault.blog || true

      # ── BIBLE1 ────────────────────────────────────────────────────────────────

      - name: Deploy 'bible1' to storeinfocus.com/bible1
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "bible1/*"
          target: "/var/www/storeinfocus.com/bible1"
          strip_components: 1

      - name: Deploy 'bible1-members' to storeinfocus.com/bible1-members
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "bible1-members/*"
          target: "/var/www/storeinfocus.com/bible1-members"
          strip_components: 1

      - name: Deploy 'bible1-es' to storeinfocus.com/bible1-es
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "bible1-es/*"
          target: "/var/www/storeinfocus.com/bible1-es"
          strip_components: 1

      - name: Deploy 'bible1-it' to storeinfocus.com/bible1-it
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "bible1-it/*"
          target: "/var/www/storeinfocus.com/bible1-it"
          strip_components: 1

      # ── SYSTEMATIC THEOLOGY ───────────────────────────────────────────────────

      - name: Deploy 'sc' to storeinfocus.com/sc
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "sc/*"
          target: "/var/www/storeinfocus.com/sc"
          strip_components: 1

      - name: Deploy 'sc-es' to storeinfocus.com/sc-es
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "sc-es/*"
          target: "/var/www/storeinfocus.com/sc-es"
          strip_components: 1

      - name: Deploy 'sc-it' to storeinfocus.com/sc-it
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "sc-it/*"
          target: "/var/www/storeinfocus.com/sc-it"
          strip_components: 1

      - name: Deploy 'sc-pt' to storeinfocus.com/sc-pt
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "sc-pt/*"
          target: "/var/www/storeinfocus.com/sc-pt"
          strip_components: 1

      # ── PROSPERITY ────────────────────────────────────────────────────────────

      - name: Deploy 'py' to storeinfocus.com/py
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "py/*"
          target: "/var/www/storeinfocus.com/py"
          strip_components: 1

      - name: Deploy 'py-es' to storeinfocus.com/py-es
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "py-es/*"
          target: "/var/www/storeinfocus.com/py-es"
