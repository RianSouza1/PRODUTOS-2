      - name: Deploy 'py-fr' to storeinfocus.com/py-fr
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "py-fr/*"
          target: "/var/www/storeinfocus.com/py-fr"
          strip_components: 1

      # ── WOODWORKING ───────────────────────────────────────────────────────────────

      - name: Deploy 'WW' to skillvault.blog/ww
        uses: appleboy/scp-action@v0.1.4
        with:
