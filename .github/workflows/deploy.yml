          target: "/var/www/skillvault.blog/ww-plans-fr"
          strip_components: 1

      - name: Deploy 'ww-plans-it' to skillvault.blog/ww-plans-it
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "ww-plans-it/*"
          target: "/var/www/skillvault.blog/ww-plans-it"
          strip_components: 1

      - name: Deploy 'mw-de' to skillvault.blog/mw-de
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
