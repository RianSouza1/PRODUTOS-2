name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'bible1/**'
      - 'bible1-members/**'
      - 'bible1-es/**'
      - 'bible1-it/**'
      - 'sc/**'
      - 'sc-es/**'
      - 'sc-it/**'
      - 'sc-pt/**'
      - 'prosperity/**'
      - 'prosperity-es/**'
      - 'prosperity-fr/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare VPS Directories for Deployments
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          script: |
            sudo mkdir -p /var/www/storeinfocus.com/bible1
            sudo mkdir -p /var/www/storeinfocus.com/bible1-members
            sudo mkdir -p /var/www/storeinfocus.com/bible1-es
            sudo mkdir -p /var/www/storeinfocus.com/bible1-it
            sudo mkdir -p /var/www/storeinfocus.com/sc
            sudo mkdir -p /var/www/storeinfocus.com/sc-es
            sudo mkdir -p /var/www/storeinfocus.com/sc-it
            sudo mkdir -p /var/www/storeinfocus.com/sc-pt
            sudo mkdir -p /var/www/storeinfocus.com/prosperity
            sudo mkdir -p /var/www/storeinfocus.com/prosperity-es
            sudo mkdir -p /var/www/storeinfocus.com/prosperity-fr
            sudo chown -R ${{ secrets.VPS_USERNAME }}:${{ secrets.VPS_USERNAME }} /var/www/storeinfocus.com || true

      # ── BIBLE1 ────────────────────────────────────────────────────────────────

      - name: Deploy 'bible1' to storeinfocus.com/bible1
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "bible1/*"
          target: "/var/www/storeinfocus.com/bible1"
          strip_components: 1

      - name: Deploy 'bible1-members' to storeinfocus.com/bible1-members
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "bible1-members/*"
          target: "/var/www/storeinfocus.com/bible1-members"
          strip_components: 1

      - name: Deploy 'bible1-es' to storeinfocus.com/bible1-es
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "bible1-es/*"
          target: "/var/www/storeinfocus.com/bible1-es"
          strip_components: 1

      - name: Deploy 'bible1-it' to storeinfocus.com/bible1-it
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "bible1-it/*"
          target: "/var/www/storeinfocus.com/bible1-it"
          strip_components: 1

      # ── SYSTEMATIC THEOLOGY ───────────────────────────────────────────────────

      - name: Deploy 'sc' to storeinfocus.com/sc
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "sc/*"
          target: "/var/www/storeinfocus.com/sc"
          strip_components: 1

      - name: Deploy 'sc-es' to storeinfocus.com/sc-es
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "sc-es/*"
          target: "/var/www/storeinfocus.com/sc-es"
          strip_components: 1

      - name: Deploy 'sc-it' to storeinfocus.com/sc-it
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "sc-it/*"
          target: "/var/www/storeinfocus.com/sc-it"
          strip_components: 1

      - name: Deploy 'sc-pt' to storeinfocus.com/sc-pt
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "sc-pt/*"
          target: "/var/www/storeinfocus.com/sc-pt"
          strip_components: 1

      # ── PROSPERITY ────────────────────────────────────────────────────────────

      - name: Deploy 'prosperity' to storeinfocus.com/prosperity
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "prosperity/*"
          target: "/var/www/storeinfocus.com/prosperity"
          strip_components: 1

      - name: Deploy 'prosperity-es' to storeinfocus.com/prosperity-es
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "prosperity-es/*"
          target: "/var/www/storeinfocus.com/prosperity-es"
          strip_components: 1

      - name: Deploy 'prosperity-fr' to storeinfocus.com/prosperity-fr
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SECRET }}
          source: "prosperity-fr/*"
          target: "/var/www/storeinfocus.com/prosperity-fr"
          strip_components: 1
